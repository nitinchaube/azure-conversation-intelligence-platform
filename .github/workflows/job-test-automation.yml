name: Test Automation KMGeneric

on:
  workflow_call:
    inputs:
      KMGENERIC_URL:
        required: false
        type: string
        description: "Web URL for KMGeneric (overrides environment variable)"
      KMGENERIC_URL_API:
        required: false
        type: string
        description: "API URL for KMGeneric (overrides environment variable)"
      TEST_SUITE:
        required: false
        type: string
        default: "GoldenPath-Testing"
        description: "Test suite to run: 'Smoke-Testing', 'GoldenPath-Testing' "
      USE_CASE:
        required: false
        type: string
        default: "telecom"
        description: "Azure Environment Use Case: 'telecom', 'IT_helpdesk'"
    secrets:
      EMAILNOTIFICATION_LOGICAPP_URL_TA:
        required: false
        description: "Logic App URL for email notifications"
    outputs:
      TEST_SUCCESS:
        description: "Whether tests passed"
        value: ${{ jobs.test.outputs.TEST_SUCCESS }}
      TEST_REPORT_URL:
        description: "URL to test report artifact"
        value: ${{ jobs.test.outputs.TEST_REPORT_URL }}
env:
  # Use input URL if provided (from deploy pipeline), otherwise fall back to vars
  url: ${{ inputs.KMGENERIC_URL  }}
  api_url: ${{ inputs.KMGENERIC_URL_API}}
  accelerator_name: "KMGeneric"
  test_suite: ${{ inputs.TEST_SUITE }}
  use_case: ${{ inputs.USE_CASE }}

jobs:
  test:
    runs-on: ubuntu-latest
    outputs:
      TEST_SUCCESS: ${{ steps.test1.outcome == 'success' || steps.test2.outcome == 'success' || steps.test3.outcome == 'success' }}
      TEST_REPORT_URL: ${{ steps.upload_report.outputs.artifact-url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tests/e2e-test/requirements.txt

      - name: Ensure browsers are installed
        run: python -m playwright install --with-deps chromium

      - name: Validate URL
        run: |
          if [ -z "${{ env.url }}" ]; then
            echo "ERROR: No URL provided for testing"
            exit 1
          elif [ -z "${{ env.api_url }}" ]; then
            echo "ERROR: No API URL provided for testing"
            exit 1
          fi
          echo "Testing URL: ${{ env.url }}"
          echo "Testing API URL: ${{ env.api_url }}"

      - name: Wait for Application to be Ready
        run: |
          echo "Waiting for application to be ready at ${{ env.url }} "
          max_attempts=10
          attempt=1
          
          while [ $attempt -le $max_attempts ]; do
            echo "Attempt $attempt: Checking if application is ready..."
            if curl -f -s "${{ env.url }}" > /dev/null; then
              echo "Application is ready!"
              break
            fi
            
            if [ $attempt -eq $max_attempts ]; then
              echo "Application is not ready after $max_attempts attempts"
              exit 1
            fi
            
            echo "Application not ready, waiting 30 seconds..."
            sleep 30
            attempt=$((attempt + 1))
          done

      - name: Validate Use Case and Test Suite
        run: |
          echo "Validating use case: '${{ env.use_case }}'"
          echo "Validating test suite: '${{ env.test_suite }}'"
          
          # Validate use case
          if [ -z "${{ env.use_case }}" ]; then
            echo "ERROR: USE_CASE is empty or not provided"
            exit 1
          elif [ "${{ env.use_case }}" != "telecom" ] && [ "${{ env.use_case }}" != "IT_helpdesk" ]; then
            echo "ERROR: Invalid USE_CASE '${{ env.use_case }}'. Must be 'telecom' or 'IT_helpdesk'"
            exit 1
          fi
          
          # Validate test suite
          if [ -z "${{ env.test_suite }}" ]; then
            echo "ERROR: TEST_SUITE is empty or not provided"
            exit 1
          elif [ "${{ env.test_suite }}" != "GoldenPath-Testing" ] && [ "${{ env.test_suite }}" != "Smoke-Testing" ]; then
            echo "ERROR: Invalid TEST_SUITE '${{ env.test_suite }}'. Must be 'GoldenPath-Testing' or 'Smoke-Testing'"
            exit 1
          fi
          
          echo "✅ Use case '${{ env.use_case }}' and test suite '${{ env.test_suite }}' are valid"

      - name: Run tests(1)
        id: test1
        run: |
          if [ "${{ env.use_case }}" == "telecom" ]; then
            if [ "${{ env.test_suite }}" == "GoldenPath-Testing" ]; then
              xvfb-run pytest tests/test_telecom_gp_tc.py --headed --html=report/report.html --self-contained-html
            elif [ "${{ env.test_suite }}" == "Smoke-Testing" ]; then
              xvfb-run pytest tests/test_telecom_gp_tc.py tests/test_telecom_smoke_tc.py --headed --html=report/report.html --self-contained-html
            fi
          elif [ "${{ env.use_case }}" == "IT_helpdesk" ]; then
            if [ "${{ env.test_suite }}" == "GoldenPath-Testing" ]; then
              xvfb-run pytest tests/test_ithelpdesk_gp_tc.py --headed --html=report/report.html --self-contained-html
            elif [ "${{ env.test_suite }}" == "Smoke-Testing" ]; then
              xvfb-run pytest tests/test_ithelpdesk_gp_tc.py tests/test_ithelpdesk_smoke_tc.py --headed --html=report/report.html --self-contained-html
            fi
          fi
        working-directory: tests/e2e-test
        continue-on-error: true

      - name: Sleep for 30 seconds
        if: ${{ steps.test1.outcome == 'failure' }}
        run: sleep 30s
        shell: bash

      - name: Run tests(2)
        if: ${{ steps.test1.outcome == 'failure' }}
        id: test2
        run: |
          if [ "${{ env.use_case }}" == "telecom" ]; then
            if [ "${{ env.test_suite }}" == "GoldenPath-Testing" ]; then
              xvfb-run pytest tests/test_telecom_gp_tc.py --headed --html=report/report.html --self-contained-html
            elif [ "${{ env.test_suite }}" == "Smoke-Testing" ]; then
              xvfb-run pytest tests/test_telecom_gp_tc.py tests/test_telecom_smoke_tc.py --headed --html=report/report.html --self-contained-html
            fi
          elif [ "${{ env.use_case }}" == "IT_helpdesk" ]; then
            if [ "${{ env.test_suite }}" == "GoldenPath-Testing" ]; then
              xvfb-run pytest tests/test_ithelpdesk_gp_tc.py --headed --html=report/report.html --self-contained-html
            elif [ "${{ env.test_suite }}" == "Smoke-Testing" ]; then
              xvfb-run pytest tests/test_ithelpdesk_gp_tc.py tests/test_ithelpdesk_smoke_tc.py --headed --html=report/report.html --self-contained-html
            fi
          fi
        working-directory: tests/e2e-test
        continue-on-error: true

      - name: Sleep for 60 seconds
        if: ${{ steps.test2.outcome == 'failure' }}
        run: sleep 60s
        shell: bash

      - name: Run tests(3)
        if: ${{ steps.test2.outcome == 'failure' }}
        id: test3
        run: |
          if [ "${{ env.use_case }}" == "telecom" ]; then
            if [ "${{ env.test_suite }}" == "GoldenPath-Testing" ]; then
              xvfb-run pytest tests/test_telecom_gp_tc.py --headed --html=report/report.html --self-contained-html
            elif [ "${{ env.test_suite }}" == "Smoke-Testing" ]; then
              xvfb-run pytest tests/test_telecom_gp_tc.py tests/test_telecom_smoke_tc.py --headed --html=report/report.html --self-contained-html
            fi
          elif [ "${{ env.use_case }}" == "IT_helpdesk" ]; then
            if [ "${{ env.test_suite }}" == "GoldenPath-Testing" ]; then
              xvfb-run pytest tests/test_ithelpdesk_gp_tc.py --headed --html=report/report.html --self-contained-html
            elif [ "${{ env.test_suite }}" == "Smoke-Testing" ]; then
              xvfb-run pytest tests/test_ithelpdesk_gp_tc.py tests/test_ithelpdesk_smoke_tc.py --headed --html=report/report.html --self-contained-html
            fi
          fi
        working-directory: tests/e2e-test

      - name: Upload test report
        id: upload_report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:

          name: test-report-${{ github.run_id }}
          path: | 
            tests/e2e-test/report/*
            tests/e2e-test/screenshots/*

      - name: Generate E2E Test Summary
        if: always()
        run: |
          # Determine test suite type for title
          if [ "${{ env.test_suite }}" == "GoldenPath-Testing" ]; then
            echo "## 🧪 E2E Test Job Summary : Golden Path Testing" >> $GITHUB_STEP_SUMMARY
          else
            echo "## 🧪 E2E Test Job Summary : Smoke Testing" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          
          # Determine overall test result
          OVERALL_SUCCESS="${{ steps.test1.outcome == 'success' || steps.test2.outcome == 'success' || steps.test3.outcome == 'success' }}"
          if [[ "$OVERALL_SUCCESS" == "true" ]]; then
            echo "| **Job Status** | ✅ Success |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| **Job Status** | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "| **Target URL** | [${{ env.url }}](${{ env.url }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Test Suite** | \`${{ env.test_suite }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Test Report** | [Download Artifact](${{ steps.upload_report.outputs.artifact-url }}) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 📋 Test Execution Details" >> $GITHUB_STEP_SUMMARY
          echo "| Attempt | Status | Notes |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Test Run 1** | ${{ steps.test1.outcome == 'success' && '✅ Passed' || '❌ Failed' }} | Initial test execution |" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ steps.test1.outcome }}" == "failure" ]]; then
            echo "| **Test Run 2** | ${{ steps.test2.outcome == 'success' && '✅ Passed' || steps.test2.outcome == 'failure' && '❌ Failed' || '⏸️ Skipped' }} | Retry after 30s delay |" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ "${{ steps.test2.outcome }}" == "failure" ]]; then
            echo "| **Test Run 3** | ${{ steps.test3.outcome == 'success' && '✅ Passed' || steps.test3.outcome == 'failure' && '❌ Failed' || '⏸️ Skipped' }} | Final retry after 60s delay |" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "$OVERALL_SUCCESS" == "true" ]]; then
            echo "### ✅ Test Results" >> $GITHUB_STEP_SUMMARY
            echo "- End-to-end tests completed successfully" >> $GITHUB_STEP_SUMMARY
            echo "- Application is functioning as expected" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Test Results" >> $GITHUB_STEP_SUMMARY
            echo "- All test attempts failed" >> $GITHUB_STEP_SUMMARY
            echo "- Check the e2e-test/test job for detailed error information" >> $GITHUB_STEP_SUMMARY
          fi